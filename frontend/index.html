<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Stashlog — Your daily work. Remembered. Standup-ready. Log your work, get AI-powered standup summaries every morning." />
    <meta name="theme-color" content="#0a0910" />

    <!-- Open Graph / Facebook (Link Sharing Previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stashlog.vercel.app/" />
    <meta property="og:title" content="Stashlog — Your daily work. Remembered. Standup-ready." />
    <meta property="og:description" content="Log your work items, automatically compile them into clean daily standup summaries using Gemini AI, and receive digests in your inbox." />
    <meta property="og:image" content="https://stashlog.vercel.app/screenshot.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://stashlog.vercel.app/" />
    <meta name="twitter:title" content="Stashlog — Your daily work. Remembered. Standup-ready." />
    <meta name="twitter:description" content="Log your work items, automatically compile them into clean daily standup summaries using Gemini AI, and receive digests in your inbox." />
    <meta name="twitter:image" content="https://stashlog.vercel.app/screenshot.png" />

    <!-- Prevent FOUC: set theme before paint -->
    <script>
      (function() {
        const stored = localStorage.getItem('stashlog-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = stored || (prefersDark ? 'dark' : 'light');
        document.documentElement.classList.add(theme);
      })();
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

    <!-- Google Identity Services (GSI) SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <title>Stashlog — Your daily work. Remembered. Standup-ready.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
